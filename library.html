<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gray Star Books</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #12150f;
      color: #f0ead8;
      font-family: Georgia, "Times New Roman", serif;
    }
    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }
    a { color: #f2d27a; }
    h1 { margin: 0 0 20px; font-size: clamp(2rem, 6vw, 4rem); letter-spacing: 0; }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      border-bottom: 1px solid #5d5130;
      padding-bottom: 16px;
    }
    .top a {
      font: 0.88rem Arial, sans-serif;
      text-decoration: none;
      border: 1px solid #5d5130;
      border-radius: 4px;
      padding: 9px 12px;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .book {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 16px;
      align-items: center;
      border: 1px solid #5d5130;
      border-radius: 6px;
      padding: 14px;
      color: inherit;
      text-decoration: none;
      background: #1a1d14;
    }
    .book:hover { border-color: #d1b865; }
    .book img {
      width: 100%;
      max-height: 72px;
      object-fit: contain;
      object-position: left center;
    }
    .book strong {
      color: #f2d27a;
      font-size: 1.1rem;
    }
    .book span {
      display: block;
      margin-top: 6px;
      color: #c6bea5;
      font: 0.85rem Arial, sans-serif;
    }
    @media (max-width: 620px) {
      .top { display: block; }
      .top a { display: inline-block; margin: 4px 8px 0 0; }
      .book { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>Gray Star Books</h1>
      <div>
        <a href="index.html">Home</a>
        <a href="assistant.html">Assistant</a>
      </div>
    </div>
    <section class="list">
      <a class="book" href="assistant.html?book=1">
        <img src="books/gs/01gstw/title.png" alt="">
        <div><strong>1. Grey Star the Wizard</strong><span>350 sections</span></div>
      </a>
      <a class="book" href="assistant.html?book=2">
        <img src="books/gs/02tfc/title.png" alt="">
        <div><strong>2. The Forbidden City</strong><span>310 sections</span></div>
      </a>
      <a class="book" href="assistant.html?book=3">
        <img src="books/gs/03btng/title.png" alt="">
        <div><strong>3. Beyond the Nightmare Gate</strong><span>350 sections</span></div>
      </a>
      <a class="book" href="assistant.html?book=4">
        <img src="books/gs/04wotw/title.png" alt="">
        <div><strong>4. War of the Wizards</strong><span>360 sections</span></div>
      </a>
    </section>
  </main>
</body>
</html>
