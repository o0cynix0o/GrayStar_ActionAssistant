<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grey Star Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #12150f;
      color: #f0ead8;
      font-family: Georgia, "Times New Roman", serif;
    }
    header {
      min-height: 34vh;
      padding: 28px clamp(18px, 5vw, 72px);
      display: grid;
      align-content: end;
      background:
        linear-gradient(90deg, rgba(18,21,15,0.96) 0%, rgba(18,21,15,0.72) 52%, rgba(18,21,15,0.22) 100%),
        url("books/gs/01gstw/title.png") center right / min(760px, 88vw) auto no-repeat,
        #12150f;
      border-bottom: 1px solid #7b6a3b;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
      color: #f2d27a;
    }
    .subtitle {
      margin: 12px 0 0;
      max-width: 740px;
      color: #d8d0b8;
      font-size: clamp(1rem, 2vw, 1.25rem);
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 42px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
    }
    .books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }
    .book {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 220px;
      padding: 16px;
      border: 1px solid #5d5130;
      border-radius: 6px;
      background: #1a1d14;
      color: inherit;
      text-decoration: none;
    }
    .book:hover, .panel a:hover { border-color: #d1b865; color: #ffe08a; }
    .book img {
      width: 100%;
      max-height: 74px;
      object-fit: contain;
      object-position: left center;
      margin-bottom: 14px;
    }
    .book strong {
      display: block;
      font-size: 1.12rem;
      color: #f2d27a;
    }
    .book span {
      display: block;
      margin-top: 8px;
      color: #c6bea5;
      font-family: Arial, sans-serif;
      font-size: 0.84rem;
    }
    .panel {
      border: 1px solid #5d5130;
      border-radius: 6px;
      background: #171a12;
      padding: 16px;
      height: fit-content;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      color: #f2d27a;
    }
    .panel a, .panel button {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #5d5130;
      border-radius: 4px;
      background: #202417;
      color: #f0ead8;
      text-align: left;
      text-decoration: none;
      font: 0.9rem Arial, sans-serif;
      cursor: pointer;
    }
    .panel .muted {
      color: #a9a088;
      font: 0.84rem Arial, sans-serif;
      line-height: 1.45;
    }
    @media (max-width: 820px) {
      header { min-height: 30vh; background-size: 560px auto; }
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Grey Star</h1>
      <p class="subtitle">The World of Lone Wolf gamebooks, wired to a Grey Star rules assistant.</p>
    </div>
  </header>

  <main>
    <section class="books" id="books"></section>
    <aside class="panel">
      <h2>Reader</h2>
      <p class="muted">Read the book on the left while using the web assistant on the right.</p>
      <a href="assistant.html">Open Reader</a>
      <button id="currentBtn" type="button">Open Current Section</button>
      <a href="library.html">Simple Book List</a>
    </aside>
  </main>

  <script>
    const books = [
      { number: 1, title: 'Grey Star the Wizard', folder: '01gstw', sections: 350 },
      { number: 2, title: 'The Forbidden City', folder: '02tfc', sections: 310 },
      { number: 3, title: 'Beyond the Nightmare Gate', folder: '03btng', sections: 350 },
      { number: 4, title: 'War of the Wizards', folder: '04wotw', sections: 360 }
    ];

    const booksEl = document.getElementById('books');
    books.forEach((book) => {
      const a = document.createElement('a');
      a.className = 'book';
      a.href = `assistant.html?book=${book.number}`;
      a.innerHTML = `
        <img src="books/gs/${book.folder}/title.png" alt="">
        <strong>${book.number}. ${book.title}</strong>
        <span>${book.sections} numbered sections</span>
      `;
      booksEl.appendChild(a);
    });

    async function getCurrentPosition() {
      try {
        const response = await fetch('current-position.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) return null;
        return await response.json();
      } catch {
        return null;
      }
    }

    document.getElementById('currentBtn').addEventListener('click', async () => {
      const position = await getCurrentPosition();
      if (!position) {
        window.location.href = 'assistant.html';
        return;
      }
      const book = books.find((item) => item.number === Number(position.book));
      const section = Number(position.section);
      if (!book || section < 1 || section > book.sections) {
        window.location.href = 'assistant.html';
        return;
      }
      window.location.href = `assistant.html?book=${book.number}&section=${section}`;
    });
  </script>
</body>
</html>
