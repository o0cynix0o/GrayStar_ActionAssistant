<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grey Star - Web Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #10130e;
      color: #efe8d0;
      font-family: Arial, sans-serif;
    }
    button, input, select {
      font: inherit;
    }
    button {
      min-height: 30px;
      border: 1px solid #6d5f35;
      border-radius: 4px;
      background: #202617;
      color: #f2d27a;
      cursor: pointer;
    }
    button:hover { border-color: #d1b865; background: #26301b; }
    button.active { background: #f2d27a; color: #171b12; border-color: #f2d27a; }
    button.danger { color: #ffb4a8; border-color: #7e4038; }
    input, select {
      min-height: 30px;
      border: 1px solid #6d5f35;
      border-radius: 4px;
      background: #10130e;
      color: #efe8d0;
      padding: 0.3rem 0.45rem;
      min-width: 0;
    }
    header {
      height: 50px;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #171b12;
      border-bottom: 1px solid #6d5f35;
    }
    header a {
      color: #b8ad87;
      text-decoration: none;
      font-size: 0.82rem;
    }
    h1 {
      margin: 0;
      color: #f2d27a;
      font: 700 1rem Georgia, "Times New Roman", serif;
      text-transform: uppercase;
    }
    .spacer { flex: 1; }
    .status-line {
      color: #b8ad87;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .workspace {
      height: calc(100vh - 50px);
      display: grid;
      grid-template-columns: minmax(430px, 1fr) minmax(460px, 44vw);
      overflow: hidden;
    }
    .reader-pane, .app-pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .reader-pane {
      border-right: 1px solid #6d5f35;
      background: #d8cfac;
    }
    .toolbar {
      min-height: 42px;
      padding: 0.42rem 0.55rem;
      background: #171b12;
      border-bottom: 1px solid #4e4528;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .toolbar button {
      padding: 0.25rem 0.52rem;
      font-size: 0.76rem;
      line-height: 1;
    }
    .reader-title {
      margin-left: auto;
      color: #d8d0b8;
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: min(38vw, 360px);
    }
    #book-frame {
      flex: 1;
      width: 100%;
      border: 0;
      background: #ffffe6;
    }
    .app-pane {
      background: #10130e;
      position: relative;
    }
    .status-grid {
      margin: 0.65rem 2.85rem 0 0.65rem;
      padding: 0.55rem;
      display: grid;
      grid-template-columns: minmax(210px, 2.3fr) repeat(4, minmax(72px, 0.65fr));
      gap: 0.5rem;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #12160f;
    }
    .stat-card, .panel, .item-row {
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #171b12;
    }
    .stat-card {
      padding: 0.55rem;
      min-height: 58px;
    }
    .stat-card span {
      display: block;
      color: #aeb091;
      font-size: 0.72rem;
      margin-bottom: 0.2rem;
    }
    .stat-card strong {
      display: block;
      color: #f2d27a;
      font-size: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .stat-card.status-book strong {
      line-height: 1.15;
      white-space: normal;
    }
    .app-menu-button,
    .card-menu-button {
      width: 20px;
      height: 20px;
      min-height: 20px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #ffffff;
      font-size: 0;
      line-height: 0;
    }
    .app-menu-button::before,
    .card-menu-button::before {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }
    .app-menu-button:hover,
    .card-menu-button:hover {
      background: #26301b;
      color: #ffffff;
    }
    .app-menu-button {
      position: absolute;
      top: 0.82rem;
      right: 0.82rem;
      z-index: 35;
    }
    .menu-popover {
      padding: 0.45rem;
      display: grid;
      gap: 0.35rem;
      border: 1px solid #6d5f35;
      border-radius: 6px;
      background: #171b12;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      z-index: 40;
    }
    .menu-popover[hidden] {
      display: none;
    }
    .app-menu-popover {
      position: absolute;
      top: 2.45rem;
      right: 0.65rem;
      width: min(310px, calc(100% - 1.3rem));
    }
    .menu-popover button {
      width: 100%;
      min-height: 28px;
      padding: 0.22rem 0.45rem;
      text-align: left;
      font-size: 0.78rem;
    }
    .menu-heading {
      color: #aeb091;
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    .menu-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.3rem;
    }
    .menu-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .menu-row button {
      text-align: center;
    }
    .tabs {
      margin: 0.55rem 0.65rem 0;
      padding: 0.5rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #171b12;
    }
    .quick-panel {
      padding: 0.55rem 0.65rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 0.5rem;
      background: #12160f;
      flex-shrink: 0;
    }
    .top-dashboard {
      padding: 0.55rem 0.65rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 0.5rem;
      border-bottom: 1px solid #4e4528;
      background: #12160f;
      flex-shrink: 0;
      max-height: 34vh;
      overflow: auto;
    }
    .top-dashboard .panel {
      margin-bottom: 0;
      padding: 0.5rem;
    }
    .top-dashboard .panel-title-row {
      margin-bottom: 0.35rem;
      align-items: start;
    }
    .top-dashboard .panel-title-row h2 {
      font: 700 0.76rem Arial, sans-serif;
      text-transform: uppercase;
      color: #aeb091;
    }
    .top-dashboard .panel-tools button {
      min-height: 22px;
      padding: 0.08rem 0.28rem;
      font-size: 0.68rem;
    }
    .top-dashboard .wide {
      grid-column: span 2;
    }
    .top-dashboard .extra-wide {
      grid-column: span 3;
    }
    .top-dashboard .dashboard-card.size-compact {
      grid-column: span 1;
    }
    .top-dashboard .dashboard-card.size-full {
      grid-column: 1 / -1;
    }
    .status-value {
      color: #f2d27a;
      font-weight: 700;
      font-size: 1rem;
      overflow-wrap: anywhere;
    }
    .status-subvalue {
      margin-top: 0.15rem;
      color: #efe8d0;
      font-size: 0.86rem;
      overflow-wrap: anywhere;
    }
    .layout-controls {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .layout-controls select {
      flex: 1 1 190px;
    }
    .quick-column {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 0.35rem;
    }
    .quick-card {
      padding: 0.5rem;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #171b12;
    }
    .quick-title {
      color: #aeb091;
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    .quick-panel .controls {
      gap: 0.28rem;
    }
    .quick-panel input,
    .quick-panel select {
      min-height: 28px;
      font-size: 0.78rem;
    }
    .quick-panel button {
      min-height: 28px;
      padding: 0.2rem 0.45rem;
      font-size: 0.76rem;
    }
    .quick-stat-label {
      min-width: 38px;
      color: #d8d0b8;
      font-size: 0.78rem;
    }
    .quick-note {
      color: #b8ad87;
      font-size: 0.72rem;
      line-height: 1.25;
    }
    .quick-drop-list {
      max-height: 82px;
      overflow: auto;
      padding-right: 0.15rem;
    }
    .quick-drop-list .item-row {
      min-height: 28px;
      margin-bottom: 0.25rem;
      padding: 0.22rem 0.35rem;
    }
    .quick-drop-list .item-row button {
      min-width: 54px;
    }
    .tabs button {
      padding: 0.28rem 0.55rem;
      font-size: 0.78rem;
    }
    #view {
      flex: 1;
      overflow: auto;
      padding: 0.65rem;
    }
    #view.view-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      gap: 0.65rem;
    }
    #view.view-card-grid > .panel {
      margin-bottom: 0;
    }
    .dashboard-card {
      position: relative;
    }
    .dashboard-card.card-size-small {
      grid-column: auto;
      padding: 0.55rem;
    }
    .dashboard-card.card-size-medium {
      grid-column: auto;
    }
    .dashboard-card.card-size-large {
      grid-column: 1 / -1;
    }
    .quick-panel .dashboard-card.card-size-large,
    .tabs.dashboard-card.card-size-large {
      grid-column: 1 / -1;
    }
    .card-menu-button {
      position: absolute;
      top: 0.22rem;
      right: 0.35rem;
      z-index: 25;
    }
    .quick-panel .card-menu-button {
      top: -0.08rem;
    }
    .card-menu {
      position: absolute;
      top: 1.9rem;
      right: 0.35rem;
      width: min(210px, calc(100% - 0.7rem));
    }
    .dashboard-card > h2,
    .dashboard-card > .section-subtitle,
    .dashboard-card .combat-meter-title-row {
      padding-right: 1.65rem;
    }
    .dashboard-card [data-card-help] {
      cursor: help;
    }
    .sheet-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.9fr);
      gap: 0.65rem;
      align-items: start;
    }
    .sheet-layout .panel,
    .layout-bar {
      margin-bottom: 0;
    }
    .dashboard-card.wide {
      grid-column: 1 / -1;
    }
    .sheet-layout .dashboard-card.size-compact {
      grid-column: auto;
    }
    .sheet-layout .dashboard-card.size-full {
      grid-column: 1 / -1;
    }
    .dashboard-card.is-dragging {
      opacity: 0.55;
    }
    .dashboard-card.drag-over {
      border-color: #d1b865;
      outline: 1px solid #d1b865;
    }
    .layout-bar {
      margin-bottom: 0.65rem;
      padding: 0.45rem;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #171b12;
    }
    .layout-bar select {
      flex: 0 1 220px;
    }
    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem;
      margin-bottom: 0.65rem;
    }
    .panel-title-row h2 {
      margin: 0;
    }
    .panel-tools {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .panel-tools button {
      min-height: 24px;
      padding: 0.12rem 0.35rem;
      font-size: 0.72rem;
    }
    .sheet-choices {
      min-height: 128px;
    }
    .choice-group {
      margin-top: 0.55rem;
    }
    .choice-group:first-of-type {
      margin-top: 0;
    }
    .choice-title {
      margin: 0 0 0.35rem;
      color: #d8d0b8;
      font-size: 0.76rem;
      text-transform: uppercase;
    }
    .panel {
      padding: 0.7rem;
      margin-bottom: 0.65rem;
    }
    .panel-danger {
      border-color: #7e4038;
      background: #1d1512;
    }
    .panel h2 {
      margin: 0 0 0.65rem;
      color: #f2d27a;
      font: 700 1rem Georgia, "Times New Roman", serif;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
    }
    .field {
      display: grid;
      gap: 0.25rem;
      color: #d8d0b8;
      font-size: 0.78rem;
    }
    .check-field {
      grid-column: 1 / -1;
      display: grid;
      gap: 0.35rem;
      color: #d8d0b8;
      font-size: 0.78rem;
    }
    .check-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 0.35rem;
    }
    .check-option {
      min-height: 30px;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.45rem;
      border: 1px solid #4e4528;
      border-radius: 4px;
      background: #10130e;
      color: #efe8d0;
    }
    .check-option input {
      min-height: 0;
      width: 16px;
      height: 16px;
      padding: 0;
    }
    .value {
      color: #efe8d0;
      font-size: 0.92rem;
    }
    .controls {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input, .controls select { flex: 1; }
    .item-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 34px;
      padding: 0.35rem 0.45rem;
      margin-bottom: 0.35rem;
    }
    .item-row span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-row span.wrap { overflow: visible; text-overflow: clip; white-space: normal; }
    .item-row small { color: #aeb091; }
    .achievement-row {
      align-items: flex-start;
    }
    .achievement-row.locked {
      opacity: 0.72;
    }
    .achievement-row strong {
      display: block;
      color: #efe8d0;
      font-size: 0.92rem;
    }
    .achievement-row p {
      margin: 0.15rem 0 0;
      color: #aeb091;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    .achievement-row small.unlocked {
      color: #f2d27a;
    }
    .section-subtitle {
      margin: 0 0 0.35rem;
      color: #d8d0b8;
      font-size: 0.78rem;
      text-transform: uppercase;
    }
    .muted {
      color: #aeb091;
      font-size: 0.82rem;
    }
    .death-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem;
    }
    .death-option {
      min-width: 0;
      padding: 0.65rem;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #12160f;
    }
    .death-option h3 {
      margin: 0 0 0.35rem;
      color: #efe8d0;
      font-size: 0.95rem;
    }
    .death-option p {
      margin: 0 0 0.55rem;
      color: #aeb091;
      font-size: 0.82rem;
      line-height: 1.35;
    }
    .death-option button {
      width: 100%;
    }
    .combat-actions {
      margin-bottom: 0.55rem;
    }
    .combat-meter-panel {
      border-color: #7e4038;
    }
    .combat-meter-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }
    .combat-meter-title-row h2 {
      margin: 0;
    }
    .combat-meter-ratio {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: #aeb091;
      font-size: 0.78rem;
    }
    .combat-meter-ratio span {
      text-transform: uppercase;
    }
    .combat-meter-ratio strong {
      color: #f2d27a;
      font-family: Consolas, "Courier New", monospace;
      font-size: 1rem;
    }
    .combat-meter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem;
    }
    .combat-meter-card {
      min-width: 0;
      padding: 0.65rem;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #12160f;
    }
    .combat-meter-header,
    .combat-meter-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.65rem;
    }
    .combat-meter-header h3 {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
      color: #efe8d0;
      font-size: 0.95rem;
    }
    .combat-meter-cs {
      color: #8fd0e6;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.86rem;
      white-space: nowrap;
    }
    .combat-meter-meta {
      margin-top: 0.45rem;
      color: #aeb091;
      font-size: 0.76rem;
    }
    .combat-meter-meta strong {
      color: #efe8d0;
      font-family: Consolas, "Courier New", monospace;
    }
    .combat-meter-track {
      height: 0.72rem;
      margin-top: 0.45rem;
      overflow: hidden;
      border: 1px solid #6d5f35;
      border-radius: 999px;
      background: #0c100b;
    }
    .combat-meter-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 160ms ease;
    }
    .combat-meter-fill.meter-good { background: #5f9d57; }
    .combat-meter-fill.meter-warning { background: #d1b865; }
    .combat-meter-fill.meter-danger { background: #b35a4b; }
    .combat-meter-note,
    .combat-meter-notes {
      margin-top: 0.45rem;
      color: #aeb091;
      font-size: 0.78rem;
    }
    .combat-meter-notes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .combat-meter-notes span {
      padding: 0.18rem 0.45rem;
      border: 1px solid #4e4528;
      border-radius: 999px;
    }
    .history-meta {
      color: #aeb091;
      font-size: 0.8rem;
    }
    .message {
      min-height: 34px;
      padding: 0.55rem 0.65rem;
      border-top: 1px solid #4e4528;
      color: #d8d0b8;
      background: #171b12;
      font-size: 0.82rem;
    }
    .toast-stack {
      display: grid;
      gap: 0.35rem;
      padding: 0 0.65rem 0.55rem;
      pointer-events: none;
    }
    .achievement-toast {
      justify-self: end;
      width: min(420px, 100%);
      padding: 0.55rem 0.7rem;
      border: 1px solid #d1b865;
      border-radius: 6px;
      background: #202617;
      color: #efe8d0;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
    }
    .achievement-toast small {
      display: block;
      margin-bottom: 0.18rem;
      color: #f2d27a;
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    .achievement-toast strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 0.95rem;
    }
    @media (max-width: 980px) {
      body { height: auto; overflow: auto; }
      .workspace { height: auto; min-height: calc(100vh - 50px); display: flex; flex-direction: column; }
      .reader-pane { min-height: 50vh; border-right: 0; border-bottom: 1px solid #6d5f35; }
      .app-pane { min-height: 50vh; }
      .top-dashboard { grid-template-columns: 1fr; max-height: none; }
      .top-dashboard .wide,
      .top-dashboard .extra-wide { grid-column: auto; }
      .status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #view.view-card-grid { grid-template-columns: 1fr; }
      .combat-meter-grid { grid-template-columns: 1fr; }
      .death-options { grid-template-columns: 1fr; }
      .sheet-layout { grid-template-columns: 1fr; }
      .dashboard-card.wide { grid-column: auto; }
      .quick-panel { grid-template-columns: 1fr; }
      .reader-title { margin-left: 0; flex-basis: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" target="_top">Home</a>
    <h1>Grey Star</h1>
    <div class="spacer"></div>
    <div class="status-line" id="serverStatus">Loading...</div>
  </header>

  <main class="workspace">
    <section class="reader-pane" aria-label="Book reader">
      <div class="toolbar">
        <button class="book-button" type="button" data-book="1">Book 1</button>
        <button class="book-button" type="button" data-book="2">Book 2</button>
        <button class="book-button" type="button" data-book="3">Book 3</button>
        <button class="book-button" type="button" data-book="4">Book 4</button>
        <button type="button" id="currentBtn">Current</button>
        <button type="button" id="titleBtn">Title</button>
        <span class="reader-title" id="readerTitle">Loading...</span>
      </div>
      <iframe id="book-frame" name="book-frame" title="Grey Star book"></iframe>
    </section>

    <section class="app-pane" aria-label="Grey Star web assistant">
      <button class="app-menu-button" type="button" id="appMenuButton" data-app-menu-toggle aria-label="Assistant menu" title="Assistant menu"></button>
      <div class="menu-popover app-menu-popover" id="appMenu" hidden></div>
      <div class="status-grid" id="statusGrid"></div>
      <section class="quick-panel" id="quickPanel" aria-label="Quick actions"></section>
      <nav class="tabs" id="tabs"></nav>
      <section id="view"></section>
      <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="false"></div>
      <div class="message" id="message">Ready.</div>
    </section>
  </main>

  <script>
    const books = [
      { number: 1, title: 'Grey Star the Wizard', folder: '01gstw', sections: 350 },
      { number: 2, title: 'The Forbidden City', folder: '02tfc', sections: 310 },
      { number: 3, title: 'Beyond the Nightmare Gate', folder: '03btng', sections: 350 },
      { number: 4, title: 'War of the Wizards', folder: '04wotw', sections: 360 }
    ];
    const lesserMagicks = ['Sorcery', 'Enchantment', 'Elementalism', 'Alchemy', 'Prophecy', 'Psychomancy', 'Evocation'];
    const higherMagicks = ['Thaumaturgy', 'Telergy', 'Physiurgy', 'Theurgy', 'Visionary', 'Necromancy'];
    const views = [
      ['sheet', 'Sheet'],
      ['inventory', 'Inventory'],
      ['magicks', 'Magicks'],
      ['sections', 'Sections'],
      ['combat', 'Combat'],
      ['achievements', 'Achievements'],
      ['saves', 'Saves'],
      ['notes', 'Notes']
    ];

    const bookFrame = document.getElementById('book-frame');
    const readerTitle = document.getElementById('readerTitle');
    const serverStatus = document.getElementById('serverStatus');
    const statusGrid = document.getElementById('statusGrid');
    const quickPanel = document.getElementById('quickPanel');
    const tabs = document.getElementById('tabs');
    const view = document.getElementById('view');
    const toastStack = document.getElementById('toastStack');
    const message = document.getElementById('message');
    const appMenu = document.getElementById('appMenu');
    let app = null;
    let activeView = 'sheet';
    let activeBook = 1;
    let activeSection = null;
    let draggedWidget = '';
    let activeCardMenu = '';
    const topLayoutKey = 'greystar.top.layout.v1';
    const topSizeKey = 'greystar.top.sizes.v1';
    const sheetLayoutKey = 'greystar.sheet.layout.v1';
    const sheetSizeKey = 'greystar.sheet.sizes.v1';
    const cardLayoutPrefix = 'greystar.cards.layout.';
    const cardSizePrefix = 'greystar.cards.size.';
    const cardClosedPrefix = 'greystar.cards.closed.';
    const cardLabelPrefix = 'greystar.cards.labels.';
    const uiPreferenceStaticKeys = [topLayoutKey, topSizeKey, sheetLayoutKey, sheetSizeKey];
    const uiPreferencePrefixes = [cardLayoutPrefix, cardSizePrefix, cardClosedPrefix, cardLabelPrefix];
    const sizeOrder = ['compact', 'normal', 'full'];
    const sizeLabels = { compact: 'Compact', normal: 'Normal', full: 'Full' };
    let uiPreferencesReady = false;
    let uiPreferenceSaveTimer = null;
    let uiPreferenceSaveSuspended = false;
    const topWidgets = [
      ['page-layout', 'Page Layout'],
      ['status-book', 'Book'],
      ['status-section', 'Section'],
      ['status-end', 'END'],
      ['status-wp', 'WP'],
      ['status-cs', 'CS'],
      ['quick-section', 'Section Actions'],
      ['quick-vitals', 'Vitals'],
      ['quick-add', 'Add Item'],
      ['quick-drop', 'Drop Item'],
      ['tabs', 'Tabs'],
      ['sheet-layout', 'Sheet Layout']
    ];
    const sheetWidgets = [
      ['action', 'Action Chart'],
      ['choices', 'Choices'],
      ['new', 'New Character'],
      ['stored', 'Stored Gear']
    ];

    function bookByNumber(number) {
      return books.find((book) => book.number === Number(number)) || books[0];
    }

    function currentCharacter() { return app.state.Character; }
    function currentInventory() { return app.state.Inventory; }
    function currentCombat() { return app.state.Combat; }
    function currentFlow() { return app.sectionFlow || {}; }
    function currentDeath() { return app.death || app.state.Automation?.DeathState || { Active: false }; }
    function currentBookComplete() { return app.bookComplete || { Active: false }; }
    function currentAchievements() { return app.achievements || app.state.Achievements || {}; }

    function bookUrl(bookNumber, section) {
      const book = bookByNumber(bookNumber);
      if (Number.isInteger(section) && section >= 1 && section <= book.sections) {
        return `books/gs/${book.folder}/sect${section}.htm`;
      }
      return `books/gs/${book.folder}/title.htm`;
    }

    function loadBook(bookNumber, section = null) {
      const book = bookByNumber(bookNumber);
      activeBook = book.number;
      activeSection = Number.isInteger(Number(section)) ? Number(section) : null;
      if (activeSection && (activeSection < 1 || activeSection > book.sections)) activeSection = null;
      bookFrame.src = bookUrl(activeBook, activeSection);
      renderReaderTitle();
    }

    function renderReaderTitle() {
      const book = bookByNumber(activeBook);
      readerTitle.textContent = activeSection ? `${book.number}. ${book.title} - Section ${activeSection}` : `${book.number}. ${book.title}`;
      document.querySelectorAll('.book-button').forEach((button) => {
        button.classList.toggle('active', Number(button.dataset.book) === activeBook);
      });
    }

    function sectionTargetFromUrl(url) {
      const match = url.pathname.match(/\/books\/gs\/([^/]+)\/sect(\d+)\.htm$/i);
      if (!match) return null;
      const book = books.find((item) => item.folder === match[1]);
      const section = Number(match[2]);
      if (!book || !Number.isInteger(section) || section < 1 || section > book.sections) return null;
      return { book: book.number, section };
    }

    async function fetchState() {
      const response = await fetch('/api/state', { cache: 'no-store' });
      if (!response.ok) throw new Error('Could not load state');
      app = await response.json();
      syncUiPreferences(app.uiPreferences);
      serverStatus.textContent = 'Connected';
      syncBookToState();
      render();
    }

    async function action(payload) {
      const response = await fetch('/api/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      app = await response.json();
      if (!response.ok) throw new Error(app.error || 'Action failed');
      syncUiPreferences(app.uiPreferences);
      message.textContent = app.message || 'Updated.';
      showAchievementUnlocks(app.achievementUnlocks);
      syncBookToState();
      render();
    }

    function showAchievementUnlocks(unlocks) {
      const entries = arr(unlocks);
      if (!toastStack || !entries.length) return;
      entries.forEach((entry) => {
        const toast = document.createElement('div');
        toast.className = 'achievement-toast';
        toast.innerHTML = `
          <small>Achievement Unlocked</small>
          <strong>${escapeHtml(text(entry.Name, 'Achievement'))}</strong>
        `;
        toastStack.appendChild(toast);
        window.setTimeout(() => {
          toast.remove();
        }, 6500);
      });
      message.textContent = entries.length === 1
        ? `Achievement unlocked: ${text(entries[0].Name, 'Achievement')}`
        : `${entries.length} achievements unlocked.`;
    }

    function syncBookToState() {
      const character = currentCharacter();
      const section = Number(app.state.CurrentSection);
      if (activeBook !== Number(character.BookNumber) || activeSection !== section) {
        loadBook(Number(character.BookNumber), section);
      }
    }

    function render() {
      renderStatus();
      renderQuickPanel();
      renderTabs();
      if (currentDeath().Active) {
        renderDeathScreen();
        decorateInterfaceCards('death');
        return;
      }
      if (currentBookComplete().Active) {
        renderBookCompleteScreen();
        decorateInterfaceCards('complete');
        return;
      }
      const renderers = {
        sheet: renderSheet,
        inventory: renderInventory,
        magicks: renderMagicks,
        sections: renderSections,
        combat: renderCombat,
        achievements: renderAchievements,
        saves: renderSaves,
        notes: renderNotes,
        settings: renderSettings
      };
      (renderers[activeView] || renderers.sheet)();
      decorateInterfaceCards(activeView);
    }

    function renderStatus() {
      const c = currentCharacter();
      const book = bookByNumber(c.BookNumber);
      statusGrid.innerHTML = [
        ['Book', `${c.BookNumber}. ${book.title}`, 'status-book'],
        ['Section', app.state.CurrentSection, 'status-section'],
        ['END', `${c.EnduranceCurrent}/${c.EnduranceMax}`, 'status-end'],
        ['WP', c.WillpowerCurrent, 'status-wp'],
        ['CS', c.CombatSkillCurrent, 'status-cs']
      ].map(([label, value, className]) => `<div class="stat-card ${className}"><span>${label}</span><strong>${escapeHtml(value)}</strong></div>`).join('');
    }

    function renderQuickPanel() {
      const inv = currentInventory();
      const automation = app.state.Automation || {};
      const ending = automation.Ending;
      const flags = automation.Flags || {};
      const backpackUnavailable = flags.backpackAvailable === false || flags.backpackItemsAvailable === false;
      const staffUnavailable = flags.staffAvailable === false;
      const flow = currentFlow();
      const rollLabel = flow.Entry?.roll ? 'Section Roll' : 'Roll 0-9';
      const successEnding = ending && String(ending.Type || '').toLowerCase() === 'success';
      quickPanel.innerHTML = `
        <div class="quick-column quick-card">
          <div class="quick-title">Section</div>
          <button type="button" data-automation-apply>Apply Effects</button>
          <button type="button" data-roll>${rollLabel}</button>
          ${successEnding ? '<button type="button" data-complete-book>Finalize Book</button>' : ''}
          <div class="quick-note">${ending ? `Ending marked: ${ending.Type}` : `Book ${currentCharacter().BookNumber}, section ${app.state.CurrentSection}`}</div>
          ${staffUnavailable || backpackUnavailable ? `<div class="quick-note">Stored gear is being held until the book returns it.</div>` : ''}
        </div>
        <div class="quick-column quick-card">
          <div class="quick-title">Vitals</div>
          ${statButtons('end', 'END', true)}
          ${statButtons('wp', 'WP', true)}
        </div>
        <div class="quick-column quick-card">
          <div class="quick-title">Add Item</div>
          <form id="quickItemForm" class="controls">
            <select name="type"><option value="weapon">Weapon</option><option value="backpack">Backpack</option><option value="special">Special</option><option value="herb">Herb</option></select>
            <input name="item" placeholder="Item name">
            <button type="submit">Add</button>
          </form>
          <div class="controls">
            <button data-meal="eat">Eat Meal</button>
            <button data-meal="missed">Missed Meal</button>
          </div>
        </div>
        <div class="quick-column quick-card">
          <div class="quick-title">Drop Item</div>
          <div class="quick-drop-list">${quickDropRows(inv)}</div>
        </div>
      `;
    }

    function renderBookCompleteScreen() {
      const completion = currentBookComplete();
      const summary = completion.Summary || {};
      const nextBook = Number(completion.NextBookNumber || 0);
      const nextTitle = text(completion.NextBookTitle, '');
      const lesserChoices = arr(completion.LesserMagickChoices);
      const continueControls = completion.CanContinue ? `
        <form id="continueBookForm" class="grid">
          ${nextBook === 2 ? `
            <label class="field">Additional Lesser Magick
              <select name="lesserMagick">
                ${lesserChoices.map((power) => `<option value="${escapeHtml(power)}">${escapeHtml(power)}</option>`).join('')}
              </select>
            </label>
          ` : ''}
          ${nextBook === 3 ? '<label class="field">Willpower Roll<input name="willpowerRoll" type="number" min="0" max="9" placeholder="Blank = random"></label>' : ''}
          <button type="submit">Continue to Book ${escapeHtml(nextBook)}</button>
        </form>
      ` : '<p class="muted">The supported Grey Star campaign is complete.</p>';

      view.innerHTML = `
        <div class="panel">
          <h2>Adventure Complete</h2>
          <div class="grid">
            ${field('Book', `${escapeHtml(text(summary.BookNumber, currentCharacter().BookNumber))}. ${escapeHtml(text(summary.BookTitle, bookByNumber(currentCharacter().BookNumber).title))}`)}
            ${field('Character', escapeHtml(text(summary.CharacterName, currentCharacter().Name)))}
            ${field('Final END', `${escapeHtml(text(summary.EnduranceCurrent, currentCharacter().EnduranceCurrent))}/${escapeHtml(text(summary.EnduranceMax, currentCharacter().EnduranceMax))}`)}
            ${field('Final WP', escapeHtml(text(summary.WillpowerCurrent, currentCharacter().WillpowerCurrent)))}
            ${field('Combat Skill', escapeHtml(text(summary.CombatSkill, currentCharacter().CombatSkillCurrent)))}
            ${field('Nobles', escapeHtml(text(summary.Nobles, currentInventory().Nobles)))}
          </div>
        </div>
        <div class="panel">
          <h2>Book Summary</h2>
          <div class="grid">
            ${field('Sections Seen', escapeHtml(text(summary.SectionsVisited, '0')))}
            ${field('Unique Sections', escapeHtml(text(summary.UniqueSectionsVisited, '0')))}
            ${field('Combats', escapeHtml(text(summary.CombatCount, '0')))}
            ${field('Victories', escapeHtml(text(summary.Victories, '0')))}
            ${field('Defeats', escapeHtml(text(summary.Defeats, '0')))}
            ${field('Survived Fights', escapeHtml(text(summary.Survived, '0')))}
            ${field('Rounds Fought', escapeHtml(text(summary.RoundsFought, '0')))}
            ${field('Deaths', escapeHtml(text(summary.DeathCount, '0')))}
          </div>
        </div>
        <div class="panel">
          <h2>Carry Forward</h2>
          <div class="grid">
            ${field('Weapons', escapeHtml(list(summary.Weapons)))}
            ${field('Backpack', escapeHtml(list(summary.BackpackItems)))}
            ${field('Special Items', escapeHtml(list(summary.SpecialItems)))}
            ${field('Herb Pouch', escapeHtml(list(summary.HerbPouchItems)))}
          </div>
        </div>
        <div class="panel">
          <h2>${completion.CanContinue ? `Continue to Book ${escapeHtml(nextBook)}` : 'Campaign Complete'}</h2>
          ${nextTitle ? `<p class="muted">${escapeHtml(nextTitle)}</p>` : ''}
          ${continueControls}
        </div>
        <div class="panel">
          <h2>Repeat This Book</h2>
          <p class="muted">Start this same book again with this character. END resets to maximum, WP resets to the character's book-start value, and unlocked achievements stay unlocked.</p>
          <button type="button" data-repeat-book>Repeat Book ${escapeHtml(text(summary.BookNumber, currentCharacter().BookNumber))}</button>
        </div>
      `;
    }

    function renderTabs() {
      tabs.innerHTML = views.map(([id, label]) => `<button type="button" class="${id === activeView ? 'active' : ''}" data-view="${id}">${label}</button>`).join('');
    }

    function targetLabel(target) {
      if (!target) return 'No checkpoint available';
      const book = text(target.BookNumber, '?');
      const section = text(target.Section, '?');
      return `Book ${book}, section ${section}`;
    }

    function renderDeathScreen() {
      const death = currentDeath();
      const outcome = String(death.Type || '').toLowerCase() === 'failure' ? 'Mission Failed' : 'Grey Star Has Fallen';
      const repeatTarget = targetLabel(death.RepeatTarget);
      const rewindTarget = targetLabel(death.RewindTarget);
      const repeatCopy = death.CanRepeat
        ? 'Try this section again. END, WP, combat, and inventory return to the checkpoint from entering this section, so items used during the failed attempt come back.'
        : 'Repeat is mainly for combat or recoverable attempts inside a section. This death happened too early in the section, so rewind is the useful recovery.';
      const rewindCopy = death.CanRewind
        ? 'Step back before this section. Use this when a route choice led to the death and you want to pick a different path.'
        : 'There is no earlier section checkpoint yet. Load a save or start a new run if repeat is not available.';
      view.innerHTML = `
        <div class="panel panel-danger">
          <h2>${escapeHtml(outcome)}</h2>
          <p class="muted">${escapeHtml(text(death.Cause, 'This path has ended.'))}</p>
          <div class="grid">
            ${field('Section', escapeHtml(text(death.Section, app.state.CurrentSection)))}
            ${field('Final END', `${escapeHtml(text(death.EnduranceCurrent, '0'))}/${escapeHtml(text(death.EnduranceMax, currentCharacter().EnduranceMax))}`)}
            ${field('Final WP', escapeHtml(text(death.WillpowerCurrent, currentCharacter().WillpowerCurrent)))}
            ${field('Recorded', escapeHtml(text(death.RecordedAt, 'Now')))}
          </div>
        </div>
        <div class="panel">
          <h2>Recovery</h2>
          <div class="death-options">
            <article class="death-option">
              <h3>Repeat Section</h3>
              <p>${escapeHtml(repeatCopy)}</p>
              <p class="muted">${escapeHtml(repeatTarget)}</p>
              <button type="button" data-death-recovery="repeat" ${death.CanRepeat ? '' : 'disabled'}>Repeat</button>
            </article>
            <article class="death-option">
              <h3>Rewind Previous Section</h3>
              <p>${escapeHtml(rewindCopy)}</p>
              <p class="muted">${escapeHtml(rewindTarget)}</p>
              <button type="button" data-death-recovery="rewind" ${death.CanRewind ? '' : 'disabled'}>Rewind</button>
            </article>
          </div>
        </div>
      `;
    }

    function cardScopeForView(scope) {
      return `view-${scope || activeView || 'sheet'}`;
    }

    function cardStorageKey(prefix, scope) {
      return `${prefix}${scope}`;
    }

    function isUiPreferenceStorageKey(key) {
      return uiPreferenceStaticKeys.includes(key) || uiPreferencePrefixes.some((prefix) => key.startsWith(prefix));
    }

    function uiPreferenceStorageKeys() {
      const keys = new Set(uiPreferenceStaticKeys);
      Object.keys(localStorage).forEach((key) => {
        if (isUiPreferenceStorageKey(key)) keys.add(key);
      });
      return Array.from(keys);
    }

    function collectUiPreferences() {
      const values = {};
      uiPreferenceStorageKeys().forEach((key) => {
        const value = localStorage.getItem(key);
        if (value !== null) values[key] = value;
      });
      return { version: 1, values };
    }

    function hasUiPreferenceValues(preferences) {
      return Boolean(preferences?.values && typeof preferences.values === 'object' && Object.keys(preferences.values).length);
    }

    function hasLocalUiPreferenceValues() {
      return uiPreferenceStorageKeys().some((key) => localStorage.getItem(key) !== null);
    }

    function applyUiPreferences(preferences) {
      const values = preferences?.values && typeof preferences.values === 'object' ? preferences.values : {};
      uiPreferenceSaveSuspended = true;
      uiPreferenceStorageKeys().forEach((key) => {
        if (!(key in values)) localStorage.removeItem(key);
      });
      Object.entries(values).forEach(([key, value]) => {
        if (isUiPreferenceStorageKey(key)) localStorage.setItem(key, String(value));
      });
      uiPreferenceSaveSuspended = false;
      uiPreferencesReady = true;
    }

    function syncUiPreferences(preferences) {
      if (uiPreferencesReady) return;
      if (!hasUiPreferenceValues(preferences) && hasLocalUiPreferenceValues()) {
        uiPreferencesReady = true;
        persistUiPreferences(true);
        return;
      }
      applyUiPreferences(preferences || { version: 1, values: {} });
    }

    function persistUiPreferences(immediate = false) {
      if (!uiPreferencesReady || uiPreferenceSaveSuspended) return;
      if (uiPreferenceSaveTimer) window.clearTimeout(uiPreferenceSaveTimer);
      const payload = collectUiPreferences();
      const save = async () => {
        try {
          await fetch('/api/ui-preferences', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } catch {}
      };
      if (immediate) {
        save();
      } else {
        uiPreferenceSaveTimer = window.setTimeout(save, 180);
      }
    }

    function getJsonStorage(key, fallback) {
      try {
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : fallback;
      } catch {
        return fallback;
      }
    }

    function setJsonStorage(key, value) {
      const next = JSON.stringify(value);
      if (localStorage.getItem(key) === next) return;
      localStorage.setItem(key, next);
      if (isUiPreferenceStorageKey(key)) persistUiPreferences();
    }

    function getCardLayout(scope) {
      const layout = getJsonStorage(cardStorageKey(cardLayoutPrefix, scope), []);
      return Array.isArray(layout) ? layout.filter(Boolean) : [];
    }

    function setCardLayout(scope, layout) {
      setJsonStorage(cardStorageKey(cardLayoutPrefix, scope), arr(layout).map((item) => text(item)).filter(Boolean));
      persistUiPreferences(true);
    }

    function getCardSizes(scope) {
      const sizes = getJsonStorage(cardStorageKey(cardSizePrefix, scope), {});
      return sizes && typeof sizes === 'object' && !Array.isArray(sizes) ? sizes : {};
    }

    function getCardSize(scope, id, defaultSize = 'large') {
      const size = text(getCardSizes(scope)[id], defaultSize);
      return ['small', 'medium', 'large'].includes(size) ? size : defaultSize;
    }

    function setCardSize(scope, id, size) {
      const sizes = getCardSizes(scope);
      sizes[id] = ['small', 'medium', 'large'].includes(size) ? size : 'large';
      setJsonStorage(cardStorageKey(cardSizePrefix, scope), sizes);
      persistUiPreferences(true);
      render();
    }

    function getClosedCards(scope) {
      const closed = getJsonStorage(cardStorageKey(cardClosedPrefix, scope), []);
      return Array.isArray(closed) ? closed.filter(Boolean) : [];
    }

    function setClosedCards(scope, closed) {
      setJsonStorage(cardStorageKey(cardClosedPrefix, scope), Array.from(new Set(arr(closed).map((item) => text(item)).filter(Boolean))));
      persistUiPreferences(true);
    }

    function getCardLabels(scope) {
      const labels = getJsonStorage(cardStorageKey(cardLabelPrefix, scope), {});
      return labels && typeof labels === 'object' && !Array.isArray(labels) ? labels : {};
    }

    function rememberCardLabel(scope, id, label) {
      const labels = getCardLabels(scope);
      labels[id] = label;
      setJsonStorage(cardStorageKey(cardLabelPrefix, scope), labels);
    }

    function slugCardTitle(title, fallback) {
      const slug = text(title, fallback)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
      return slug || fallback;
    }

    function cardTitle(card, fallback = 'Section') {
      return text(
        card.querySelector(':scope > h2')?.textContent ||
        card.querySelector(':scope > .quick-title')?.textContent ||
        card.querySelector('.combat-meter-title-row h2')?.textContent,
        fallback
      ).trim();
    }

    function cardHelp(title, scope) {
      const key = slugCardTitle(title, '');
      const help = {
        choices: 'This card shows assistant actions found in the current book section: loot, costs, status flags, combat, and section-aware rolls.',
        'section-assistant': 'Use this when a section has rolls, loot, special costs, or combat presets that are not handled by the book link itself.',
        'stored-gear': 'This keeps the inventory record for gear the book has taken away and may return later.',
        'start-tracked-combat': 'Use this for fights that are not started by a section preset. Staff WP controls how much Willpower you spend with the Wizard’s Staff each round.',
        'combat-controls': 'Resolve rounds here. Pick the active weapon, choose Staff magic when allowed, and enter the section’s roll if the book gives one.',
        'recent-combat-rounds': 'This is the round-by-round audit trail for the current fight, including END loss, WP spend, and ignored-loss rules.',
        'section': 'Apply section effects and section-aware rolls from the audit data.',
        'drop-item': 'Quickly remove carried items without opening the full Inventory tab.'
      };
      return help[key] || (scope === 'tabs' ? 'Switch between assistant views. Re-add this from the assistant menu if you close it.' : '');
    }

    function applyCardOrder(scope, cards) {
      const parent = cards[0]?.parentElement;
      if (!parent) return cards;
      const layout = getCardLayout(scope);
      if (!layout.length) return cards;
      const byId = new Map(cards.map((card) => [card.dataset.cardId, card]));
      const ordered = [];
      layout.forEach((id) => {
        const card = byId.get(id);
        if (card && !ordered.includes(card)) ordered.push(card);
      });
      cards.forEach((card) => {
        if (!ordered.includes(card)) ordered.push(card);
      });
      ordered.forEach((card) => parent.appendChild(card));
      return ordered;
    }

    function cardMenuHtml(scope, id, title, size, options) {
      const movementDisabled = options.movable === false ? 'disabled' : '';
      const closeDisabled = options.closeable === false ? 'disabled' : '';
      const sizeButton = (value, label) => `<button type="button" class="${size === value ? 'active' : ''}" data-card-size="${scope}:${id}:${value}">${label}</button>`;
      return `
        <button class="card-menu-button" type="button" data-card-menu-toggle="${escapeHtml(scope)}:${escapeHtml(id)}" aria-label="${escapeHtml(title)} menu" title="${escapeHtml(title)} menu"></button>
        <div class="menu-popover card-menu" data-card-menu="${escapeHtml(scope)}:${escapeHtml(id)}" hidden>
          <div class="menu-heading">${escapeHtml(title)}</div>
          <div class="menu-row">
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:up" ${movementDisabled}>Up</button>
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:down" ${movementDisabled}>Down</button>
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:left" ${movementDisabled}>Left</button>
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:right" ${movementDisabled}>Right</button>
          </div>
          <div class="menu-heading">Size</div>
          <div class="menu-row three">
            ${sizeButton('small', 'Small')}
            ${sizeButton('medium', 'Medium')}
            ${sizeButton('large', 'Large')}
          </div>
          <button type="button" class="danger" data-card-close="${escapeHtml(scope)}:${escapeHtml(id)}" ${closeDisabled}>Close Section</button>
        </div>
      `;
    }

    function decorateCards(scope, cards, options = {}) {
      const actualCards = arr(cards).filter(Boolean);
      if (!actualCards.length) return;
      const seen = {};
      actualCards.forEach((card) => {
        const title = cardTitle(card);
        const base = slugCardTitle(title, 'card');
        seen[base] = (seen[base] || 0) + 1;
        const id = seen[base] === 1 ? base : `${base}-${seen[base]}`;
        card.dataset.cardScope = scope;
        card.dataset.cardId = id;
        card.dataset.cardTitle = title;
        rememberCardLabel(scope, id, title);
      });
      const ordered = options.movable === false ? actualCards : applyCardOrder(scope, actualCards);
      const closed = new Set(getClosedCards(scope));
      ordered.forEach((card) => {
        const id = card.dataset.cardId;
        const title = card.dataset.cardTitle || cardTitle(card);
        const defaultSize = options.defaultSize || 'large';
        const size = getCardSize(scope, id, defaultSize);
        card.hidden = closed.has(id);
        card.classList.add('dashboard-card');
        card.classList.remove('card-size-small', 'card-size-medium', 'card-size-large');
        card.classList.add(`card-size-${size}`);
        card.querySelector(':scope > .card-menu-button')?.remove();
        card.querySelector(':scope > .card-menu')?.remove();
        card.insertAdjacentHTML('afterbegin', cardMenuHtml(scope, id, title, size, options));
        const help = cardHelp(title, scope);
        const helpTarget = card.querySelector(':scope > h2') || card.querySelector(':scope > .quick-title') || card.querySelector('.combat-meter-title-row h2');
        if (help && helpTarget) {
          helpTarget.title = help;
          helpTarget.dataset.cardHelp = 'true';
        }
      });
    }

    function decorateInterfaceCards(scope) {
      const viewScope = cardScopeForView(scope);
      view.classList.add('view-card-grid');
      decorateCards('quick', Array.from(quickPanel.querySelectorAll(':scope > .quick-card')), { defaultSize: 'medium' });
      decorateCards('tabs', [tabs], { defaultSize: 'large', movable: false });
      decorateCards(viewScope, Array.from(view.querySelectorAll(':scope > .panel')), { defaultSize: 'large' });
    }

    function moveCard(scope, id, direction) {
      const cards = Array.from(document.querySelectorAll('[data-card-scope]')).filter((card) => card.dataset.cardScope === scope);
      const ids = cards.map((card) => card.dataset.cardId).filter(Boolean);
      if (!ids.includes(id)) return;
      const index = ids.indexOf(id);
      const next = ['up', 'left'].includes(direction) ? index - 1 : index + 1;
      if (next < 0 || next >= ids.length) return;
      [ids[index], ids[next]] = [ids[next], ids[index]];
      setCardLayout(scope, ids);
      render();
    }

    function closeCard(scope, id) {
      const closed = new Set(getClosedCards(scope));
      closed.add(id);
      setClosedCards(scope, Array.from(closed));
      render();
    }

    function openCard(scope, id) {
      setClosedCards(scope, getClosedCards(scope).filter((item) => item !== id));
      render();
    }

    function resetCardScope(scope) {
      [cardLayoutPrefix, cardSizePrefix, cardClosedPrefix].forEach((prefix) => localStorage.removeItem(cardStorageKey(prefix, scope)));
      persistUiPreferences(true);
      render();
    }

    function resetAllCardLayouts() {
      const prefixes = [cardLayoutPrefix, cardSizePrefix, cardClosedPrefix];
      Object.keys(localStorage)
        .filter((key) => prefixes.some((prefix) => key.startsWith(prefix)))
        .forEach((key) => localStorage.removeItem(key));
      persistUiPreferences(true);
      render();
    }

    function closeMenus() {
      appMenu.hidden = true;
      activeCardMenu = '';
      document.querySelectorAll('.card-menu').forEach((menu) => { menu.hidden = true; });
    }

    function toggleCardMenu(scope, id) {
      const token = `${scope}:${id}`;
      const currentMenu = Array.from(document.querySelectorAll('[data-card-menu]')).find((menu) => menu.dataset.cardMenu === token);
      const wasOpen = activeCardMenu === token && currentMenu && !currentMenu.hidden;
      closeMenus();
      if (wasOpen) return;
      const menu = Array.from(document.querySelectorAll('[data-card-menu]')).find((item) => item.dataset.cardMenu === token);
      if (menu) {
        menu.hidden = false;
        activeCardMenu = token;
      }
    }

    function hiddenCardEntries() {
      const entries = [];
      document.querySelectorAll('[data-card-scope][data-card-id][hidden]').forEach((card) => {
        entries.push({
          scope: card.dataset.cardScope,
          id: card.dataset.cardId,
          label: card.dataset.cardTitle || getCardLabels(card.dataset.cardScope)[card.dataset.cardId] || card.dataset.cardId
        });
      });
      return entries;
    }

    function renderAppMenu() {
      const hidden = hiddenCardEntries();
      appMenu.innerHTML = `
        <div class="menu-heading">Assistant</div>
        <button type="button" data-save-current>Save Game</button>
        <button type="button" data-autosave>Autosave: On</button>
        <button type="button" data-settings-view>Settings</button>
        <button type="button" class="danger" data-shutdown-app>Shut Down App</button>
        <div class="menu-heading">Closed Sections</div>
        ${hidden.length ? hidden.map((entry) => `
          <button type="button" data-card-open="${escapeHtml(entry.scope)}:${escapeHtml(entry.id)}">Re-add ${escapeHtml(entry.label)}</button>
        `).join('') : '<div class="muted">No closed sections.</div>'}
      `;
    }

    function topWidgetLabel(id) {
      const widget = topWidgets.find(([key]) => key === id);
      return widget ? widget[1] : id;
    }

    function sizeStorageKey(scope) {
      return scope === 'top' ? topSizeKey : sheetSizeKey;
    }

    function normalizeWidgetSize(size) {
      return sizeOrder.includes(size) ? size : 'normal';
    }

    function getWidgetSizes(scope) {
      try {
        const saved = localStorage.getItem(sizeStorageKey(scope));
        const parsed = saved ? JSON.parse(saved) : {};
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch {
        return {};
      }
    }

    function getWidgetSize(scope, id) {
      return normalizeWidgetSize(getWidgetSizes(scope)[id]);
    }

    function setWidgetSize(scope, id, size) {
      const sizes = getWidgetSizes(scope);
      const nextSize = normalizeWidgetSize(size);
      if (nextSize === 'normal') delete sizes[id];
      else sizes[id] = nextSize;
      setJsonStorage(sizeStorageKey(scope), sizes);
      render();
    }

    function cycleWidgetSize(scope, id) {
      const current = getWidgetSize(scope, id);
      const next = sizeOrder[(sizeOrder.indexOf(current) + 1) % sizeOrder.length];
      setWidgetSize(scope, id, next);
    }

    function isTopWidgetAvailable(id) {
      return id !== 'sheet-layout' || activeView === 'sheet';
    }

    function defaultTopLayout() {
      return topWidgets.map(([id]) => id);
    }

    function cleanTopLayout(layout) {
      const known = new Set(topWidgets.map(([id]) => id));
      const result = [];
      arr(layout).forEach((id) => {
        const key = text(id).trim();
        if (known.has(key) && !result.includes(key)) result.push(key);
      });
      if (!result.includes('page-layout')) result.unshift('page-layout');
      return result;
    }

    function getTopLayout() {
      try {
        const saved = localStorage.getItem(topLayoutKey);
        if (saved) return cleanTopLayout(JSON.parse(saved));
      } catch {}
      return defaultTopLayout();
    }

    function setTopLayout(layout) {
      setJsonStorage(topLayoutKey, cleanTopLayout(layout));
      render();
    }

    function resetTopLayout() {
      localStorage.removeItem(topLayoutKey);
      localStorage.removeItem(topSizeKey);
      persistUiPreferences();
      render();
    }

    function addTopWidget(id) {
      const layout = getTopLayout();
      if (!id || layout.includes(id)) return;
      setTopLayout([...layout, id]);
    }

    function removeTopWidget(id) {
      if (id === 'page-layout') return;
      setTopLayout(getTopLayout().filter((item) => item !== id));
    }

    function moveTopWidget(id, direction) {
      const layout = getTopLayout();
      const index = layout.indexOf(id);
      if (index < 0) return;
      const next = ['up', 'left'].includes(direction) ? index - 1 : index + 1;
      if (next < 0 || next >= layout.length) return;
      [layout[index], layout[next]] = [layout[next], layout[index]];
      setTopLayout(layout);
    }

    function dropTopWidget(source, target) {
      if (!source || !target || source === target) return;
      const layout = getTopLayout().filter((id) => id !== source);
      const targetIndex = layout.indexOf(target);
      if (targetIndex < 0) return;
      layout.splice(targetIndex, 0, source);
      setTopLayout(layout);
    }

    function renderTopLayoutControls(layout) {
      const hidden = topWidgets.filter(([id]) => id !== 'page-layout' && !layout.includes(id) && isTopWidgetAvailable(id));
      return `
        <div class="layout-controls">
          <select id="topWidgetAdd" ${hidden.length ? '' : 'disabled'}>
            ${hidden.map(([id, label]) => `<option value="${id}">${label}</option>`).join('') || '<option value="">All sections shown</option>'}
          </select>
          <button type="button" data-top-widget-add ${hidden.length ? '' : 'disabled'}>Add Section</button>
          <button type="button" data-top-widget-reset>Reset</button>
        </div>
      `;
    }

    function statusWidgetBody(id) {
      const c = currentCharacter();
      const book = bookByNumber(c.BookNumber);
      const values = {
        'status-book': [`${c.BookNumber}. ${book.title}`, ''],
        'status-section': [app.state.CurrentSection, ''],
        'status-end': [`${c.EnduranceCurrent}/${c.EnduranceMax}`, ''],
        'status-wp': [c.WillpowerCurrent, ''],
        'status-cs': [c.CombatSkillCurrent, '']
      };
      const [value, subvalue] = values[id] || ['', ''];
      return `
        <div class="status-value">${escapeHtml(value)}</div>
        ${subvalue ? `<div class="status-subvalue">${escapeHtml(subvalue)}</div>` : ''}
      `;
    }

    function quickSectionBody() {
      const automation = app.state.Automation || {};
      const ending = automation.Ending;
      const flags = automation.Flags || {};
      const backpackUnavailable = flags.backpackAvailable === false || flags.backpackItemsAvailable === false;
      const staffUnavailable = flags.staffAvailable === false;
      const flow = currentFlow();
      const rollLabel = flow.Entry?.roll ? 'Section Roll' : 'Roll 0-9';
      return `
        <div class="controls">
          <button type="button" data-automation-apply>Apply Effects</button>
          <button type="button" data-roll>${rollLabel}</button>
        </div>
        <div class="quick-note">${ending ? `Ending marked: ${escapeHtml(ending.Type)}` : `Book ${escapeHtml(currentCharacter().BookNumber)}, section ${escapeHtml(app.state.CurrentSection)}`}</div>
        ${staffUnavailable || backpackUnavailable ? `<div class="quick-note">Stored gear is being held until the book returns it.</div>` : ''}
      `;
    }

    function quickVitalsBody() {
      return `
        ${statButtons('end', 'END', true)}
        ${statButtons('wp', 'WP', true)}
      `;
    }

    function quickAddBody() {
      return `
        <form id="quickItemForm" class="controls">
          <select name="type"><option value="weapon">Weapon</option><option value="backpack">Backpack</option><option value="special">Special</option><option value="herb">Herb</option></select>
          <input name="item" placeholder="Item name">
          <button type="submit">Add</button>
        </form>
        <div class="controls" style="margin-top:.35rem">
          <button data-meal="eat">Eat Meal</button>
          <button data-meal="missed">Missed Meal</button>
        </div>
      `;
    }

    function quickDropBody() {
      const inv = currentInventory();
      return `<div class="quick-drop-list">${quickDropRows(inv)}</div>`;
    }

    function tabsBody() {
      return `
        <div class="controls">
          ${views.map(([id, label]) => `<button type="button" class="${id === activeView ? 'active' : ''}" data-view="${id}">${label}</button>`).join('')}
        </div>
      `;
    }

    function renderTopWidget(id, layout) {
      if (!isTopWidgetAvailable(id)) return '';
      if (id === 'page-layout') {
        return dashboardPanel('page-layout', 'Page Layout', renderTopLayoutControls(layout), ['extra-wide'], 'top', false);
      }
      if (id.startsWith('status-')) {
        return dashboardPanel(id, topWidgetLabel(id), statusWidgetBody(id), ['top-status'], 'top');
      }
      if (id === 'quick-section') return dashboardPanel(id, 'Section Actions', quickSectionBody(), ['wide'], 'top');
      if (id === 'quick-vitals') return dashboardPanel(id, 'Vitals', quickVitalsBody(), ['wide'], 'top');
      if (id === 'quick-add') return dashboardPanel(id, 'Add Item', quickAddBody(), ['wide'], 'top');
      if (id === 'quick-drop') return dashboardPanel(id, 'Drop Item', quickDropBody(), ['wide'], 'top');
      if (id === 'tabs') return dashboardPanel(id, 'Tabs', tabsBody(), ['extra-wide'], 'top');
      if (id === 'sheet-layout') return dashboardPanel(id, 'Sheet Layout', renderSheetLayoutControls(getSheetLayout()), ['extra-wide'], 'top');
      return '';
    }

    function renderTopDashboard() {
      const layout = getTopLayout();
      topDashboard.innerHTML = layout.map((id) => renderTopWidget(id, layout)).join('');
    }

    function sheetWidgetLabel(id) {
      const widget = sheetWidgets.find(([key]) => key === id);
      return widget ? widget[1] : id;
    }

    function hasSavedCharacter() {
      return Boolean(text(app?.state?.Settings?.SavePath).trim());
    }

    function defaultSheetLayout() {
      return hasSavedCharacter() ? ['action', 'choices'] : ['action', 'new', 'choices'];
    }

    function cleanSheetLayout(layout) {
      const known = new Set(sheetWidgets.map(([id]) => id));
      const result = [];
      arr(layout).forEach((id) => {
        const key = text(id).trim();
        if (known.has(key) && !result.includes(key)) result.push(key);
      });
      return result;
    }

    function getSheetLayout() {
      try {
        const saved = localStorage.getItem(sheetLayoutKey);
        if (saved) return cleanSheetLayout(JSON.parse(saved));
      } catch {}
      return defaultSheetLayout();
    }

    function setSheetLayout(layout) {
      setJsonStorage(sheetLayoutKey, cleanSheetLayout(layout));
      render();
    }

    function resetSheetLayout() {
      localStorage.removeItem(sheetLayoutKey);
      localStorage.removeItem(sheetSizeKey);
      persistUiPreferences();
      render();
    }

    function addSheetWidget(id) {
      const layout = getSheetLayout();
      if (!id || layout.includes(id)) return;
      setSheetLayout([...layout, id]);
    }

    function removeSheetWidget(id) {
      setSheetLayout(getSheetLayout().filter((item) => item !== id));
    }

    function moveSheetWidget(id, direction) {
      const layout = getSheetLayout();
      const index = layout.indexOf(id);
      if (index < 0) return;
      const next = ['up', 'left'].includes(direction) ? index - 1 : index + 1;
      if (next < 0 || next >= layout.length) return;
      [layout[index], layout[next]] = [layout[next], layout[index]];
      setSheetLayout(layout);
    }

    function dropSheetWidget(source, target) {
      if (!source || !target || source === target) return;
      const layout = getSheetLayout().filter((id) => id !== source);
      const targetIndex = layout.indexOf(target);
      if (targetIndex < 0) return;
      layout.splice(targetIndex, 0, source);
      setSheetLayout(layout);
    }

    function renderSheetLayoutControls(layout) {
      const hidden = sheetWidgets.filter(([id]) => !layout.includes(id));
      return `
        <div class="layout-controls">
          <select id="sheetWidgetAdd" ${hidden.length ? '' : 'disabled'}>
            ${hidden.map(([id, label]) => `<option value="${id}">${label}</option>`).join('') || '<option value="">All sections shown</option>'}
          </select>
          <button type="button" data-widget-add ${hidden.length ? '' : 'disabled'}>Add Section</button>
          <button type="button" data-widget-reset>Reset</button>
        </div>
      `;
    }

    function dashboardPanel(id, title, body, classes = [], scope = 'sheet', removable = true) {
      const size = getWidgetSize(scope, id);
      const className = ['panel', 'dashboard-card', `size-${size}`].concat(classes).filter(Boolean).join(' ');
      const safeScope = escapeHtml(scope);
      const safeId = escapeHtml(id);
      return `
        <section class="${className}" data-widget="${safeId}" data-layout-scope="${safeScope}" draggable="true">
          <div class="panel-title-row">
            <h2>${escapeHtml(title)}</h2>
            <div class="panel-tools">
              <button type="button" data-widget-move="${safeScope}:${safeId}:left">Left</button>
              <button type="button" data-widget-move="${safeScope}:${safeId}:right">Right</button>
              <button type="button" data-widget-size="${safeScope}:${safeId}">${escapeHtml(sizeLabels[size])}</button>
              ${removable ? `<button type="button" class="danger" data-widget-remove="${safeScope}:${safeId}">Remove</button>` : ''}
            </div>
          </div>
          ${body}
        </section>
      `;
    }

    function choiceGroup(title, rows) {
      if (!rows) return '';
      return `
        <div class="choice-group">
          <div class="choice-title">${escapeHtml(title)}</div>
          ${rows}
        </div>
      `;
    }

    function sectionAutomationRows() {
      const automation = currentFlow().Automation || {};
      const messages = arr(automation.Messages);
      if (!automation.Summary) return '';
      return `
        <div class="item-row">
          <small>${automation.Applied ? 'Applied' : 'Ready'}</small>
          <span class="wrap">${escapeHtml(automation.Summary)}</span>
          ${automation.Applied ? '' : '<button type="button" data-automation-apply>Apply</button>'}
        </div>
        ${messages.map((line) => `
          <div class="item-row">
            <small>Result</small>
            <span class="wrap">${escapeHtml(line)}</span>
          </div>
        `).join('')}
      `;
    }

    function sectionLootRows(entry) {
      return arr(entry.loot).map((loot) => `
        <div class="item-row">
          <small>Loot</small>
          <span class="wrap">${escapeHtml(text(loot.label || loot.id, 'Option'))}</span>
          <button type="button" data-flow-loot="${escapeHtml(text(loot.id))}">Apply</button>
        </div>
      `).join('');
    }

    function sectionCombatRows(entry) {
      return arr(entry.combat).map((combat) => `
        <div class="item-row">
          <small>CS ${escapeHtml(text(combat.enemy?.cs || combat.enemies?.[0]?.cs, '?'))}</small>
          <span class="wrap">${escapeHtml(text(combat.label || combat.enemy?.name || combat.enemies?.[0]?.name, 'Section combat'))}</span>
          <button type="button" data-section-combat-start="${escapeHtml(text(combat.id))}">Start</button>
        </div>
      `).join('');
    }

    function sectionStatusRows(entry) {
      return arr(entry.status).map((status) => {
        const current = app.state.Automation?.Flags?.[status.key] === true;
        return `
          <div class="item-row">
            <small>${current ? 'On' : 'Off'}</small>
            <span class="wrap">${escapeHtml(text(status.label || status.key, 'Status'))}</span>
            <button type="button" data-status-flag="${escapeHtml(status.key)}:${current ? 'false' : 'true'}">${current ? 'Clear' : 'Set'}</button>
          </div>
        `;
      }).join('');
    }

    function sectionWillpowerRows(entry) {
      const costs = arr(entry.wpCosts);
      if (entry.wpCost) costs.unshift(entry.wpCost);
      if (!costs.length) return '';
      return costs.map((wp) => `
        <div class="item-row">
          <small>${escapeHtml(text(wp.cost, '0'))} WP</small>
          <span class="wrap">${escapeHtml(text(wp.label, 'Section Willpower cost'))}</span>
          <button type="button" data-wp-cost="${escapeHtml(wp.cost)}:negative">Spend WP</button>
          <button type="button" data-wp-cost="${escapeHtml(wp.cost)}:endurance_for_missing">Use END</button>
        </div>
      `).join('');
    }

    function sectionRollRows(entry) {
      const lastRoll = currentFlow().LastRoll;
      if (!entry.roll && !lastRoll) return '';
      return `
        <div class="controls" style="margin-bottom:.35rem">
          <input id="manualRoll" type="number" min="0" max="9" placeholder="Optional roll">
          <button type="button" data-roll>Roll</button>
        </div>
        ${entry.roll ? `<p class="muted">${escapeHtml(text(entry.roll.summary, 'Section-aware roll'))}</p>` : ''}
        ${lastRoll ? `
          <div class="item-row">
            <small>${escapeHtml(lastRoll.Raw)}</small>
            <span class="wrap">Total ${escapeHtml(lastRoll.Total)}${lastRoll.Outcome ? ` | ${escapeHtml(lastRoll.Outcome)}` : ''}</span>
            ${lastRoll.Route ? `<button type="button" data-route="${escapeHtml(lastRoll.Route)}">Go ${escapeHtml(lastRoll.Route)}</button>` : ''}
          </div>
        ` : ''}
      `;
    }

    function sectionRouteRows() {
      return arr(currentFlow().SourceRoutes).map((route) => (
        `<div class="item-row">
          <small>${escapeHtml(route.Section)}</small>
          <span class="wrap">${escapeHtml(route.Label || `Go to ${route.Section}`)}</span>
          <button type="button" data-route="${escapeHtml(route.Section)}">Go</button>
        </div>`
      )).join('');
    }

    function choicesPanelBody() {
      const entry = currentFlow().Entry || {};
      const groups = [
        choiceGroup('Entry Effect', sectionAutomationRows()),
        choiceGroup('Loot And Section Items', sectionLootRows(entry)),
        choiceGroup('Willpower Cost', sectionWillpowerRows(entry)),
        choiceGroup('Section Combat', sectionCombatRows(entry)),
        choiceGroup('Status Flags', sectionStatusRows(entry)),
        choiceGroup('Section Roll', sectionRollRows(entry))
      ].filter(Boolean);
      return groups.join('') || '<p class="muted">No section choices recorded for this section.</p>';
    }

    function renderChoicesPanel() {
      return `
        <div class="panel sheet-choices">
          <h2>Choices</h2>
          ${choicesPanelBody()}
        </div>
      `;
    }

    function actionChartBody() {
      const c = currentCharacter();
      const inv = currentInventory();
      return `
        <div class="grid">
          ${field('Name', c.Name)}
          ${field('Nobles', inv.Nobles)}
          ${field('Combat Skill', `${c.CombatSkillCurrent} (base ${c.CombatSkillBase})`)}
          ${field('Endurance', `${c.EnduranceCurrent}/${c.EnduranceMax}`)}
          ${field('Willpower', c.WillpowerCurrent)}
          ${field('Completed Books', list(c.CompletedBooks))}
        </div>
      `;
    }

    function newCharacterBody() {
      const defaultLesser = new Set(lesserMagicks.slice(0, 5));
      const lesserChoices = lesserMagicks.map((name) => `
        <label class="check-option">
          <input type="checkbox" name="lesserMagicks" value="${escapeHtml(name)}" ${defaultLesser.has(name) ? 'checked' : ''}>
          <span>${escapeHtml(name)}</span>
        </label>
      `).join('');
      return `
        <form id="newForm" class="grid">
          <label class="field">Name<input name="name" value="Grey Star"></label>
          <label class="field">Book<select name="bookNumber" data-new-book>${books.map((b) => `<option value="${b.number}">${b.number}. ${b.title}</option>`).join('')}</select></label>
          <label class="field">Gift<select name="gift"><option value="">None</option><option value="dagger">Jewelled Dagger</option><option value="talisman">Magic Talisman</option><option value="laumspur">Vial of Laumspur</option></select></label>
          <div class="check-field">
            <span data-lesser-help>Lesser Magicks - choose 5 for Book 1</span>
            <div class="check-grid">${lesserChoices}</div>
          </div>
          <button type="submit">Create</button>
        </form>
      `;
    }

    function adjustNewCharacterMagicks(form) {
      const bookNumber = Number(form?.querySelector('[name="bookNumber"]')?.value || 1);
      const target = bookNumber > 1 ? 6 : 5;
